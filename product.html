<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product View | BLLUG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="product-page">
  <nav id="navigation" class="navigation visible">
    <div class="nav-wrapper">
      <div class="nav-content">
        <a href="index.html#about" class="nav-logo">
          <img src="public/assets/bllug-logo.png" alt="BLLUG" class="logo-img" />
        </a>
        <div class="nav-desktop">
          <a href="index.html#launch" class="nav-link">SHOP</a>
          <a href="index.html#about" class="nav-link">ABOUT</a>
          <a href="index.html#gallery" class="nav-link">GALLERY</a>
        </div>
        <div class="nav-right">
          <button class="nav-cart" type="button" aria-label="Cart">
            <svg class="cart-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="cart-count">0</span>
          </button>
          <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
            <span class="hamburger-line line1"></span>
            <span class="hamburger-line line2"></span>
          </button>
        </div>
      </div>
    </div>
    <div id="mobile-menu" class="mobile-menu">
      <div class="mobile-menu-content">
        <a href="index.html#launch" class="mobile-nav-link">SHOP</a>
        <a href="index.html#about" class="mobile-nav-link">ABOUT</a>
        <a href="index.html#gallery" class="mobile-nav-link">GALLERY</a>
      </div>
    </div>
  </nav>

  <main class="product-view-main">
    <div class="product-view-grid">
      <aside class="product-thumbs" aria-label="Product thumbnails" id="productThumbList"></aside>

      <section class="product-gallery">
        <div class="product-gallery-card">
          <img id="productHeroImage" src="" alt="Product preview" class="product-gallery-image" />
        </div>
      </section>

      <aside class="product-info">
        <div class="product-info-card">
          <p class="product-meta-label" id="productSeriesLabel"></p>
          <h1 class="product-name" id="productName"></h1>
          <p class="product-subtitle" id="productSubtitle"></p>
          <p class="product-price" id="productPrice"></p>
          <p class="product-material" id="productMaterial"></p>
          <p class="product-description" id="productNote"></p>

          <div class="product-meta-list">
            <div class="product-meta-item">
              <span>Fit</span>
              <strong>Relaxed urban cut</strong>
            </div>
            <div class="product-meta-item">
              <span>Availability</span>
              <strong>Limited release</strong>
            </div>
            <div class="product-meta-item">
              <span>Fabric</span>
              <strong id="productFabric"></strong>
            </div>
          </div>

          <div class="product-sizes launch-sizes" aria-label="Available sizes">
            <button type="button" class="size-option" data-size="S" aria-pressed="false">S</button>
            <button type="button" class="size-option" data-size="M" aria-pressed="false">M</button>
            <button type="button" class="size-option" data-size="L" aria-pressed="false">L</button>
            <button type="button" class="size-option" data-size="XL" aria-pressed="false">XL</button>
            <button type="button" class="size-option" data-size="XXL" aria-pressed="false">XXL</button>
          </div>

          <div class="product-actions-panel">
            <button type="button" class="btn btn-primary btn-large" id="productAddToCart">ADD TO CART</button>
            <button type="button" class="btn btn-secondary btn-large" id="productBuyNow">BUY NOW</button>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-overlay"></div>
    <div class="cart-panel">
      <div class="cart-header">
        <h2 class="cart-title">YOUR CART</h2>
        <button class="cart-close" id="cart-close" type="button" aria-label="Close cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="cart-empty" id="cart-empty">
        <p class="cart-empty-text">YOUR CART IS EMPTY</p>
        <p class="cart-empty-subtext">Add items to get started</p>
      </div>

      <div class="cart-items" id="cart-items"></div>

      <div class="cart-footer" id="cart-footer">
        <div class="cart-subtotal">
          <span class="cart-subtotal-label">SUBTOTAL</span>
          <span class="cart-subtotal-amount" id="cart-subtotal">₹0</span>
        </div>
        <button class="cart-checkout-btn" id="cartCheckout" type="button">PROCEED TO CHECKOUT</button>
        <p class="cart-footer-note">Shipping and taxes calculated at checkout</p>
      </div>
    </div>
  </div>

  <script src="product-page.js"></script>
</body>
</html>
